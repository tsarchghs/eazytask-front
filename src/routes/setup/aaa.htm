
<!doctype html>
<html>
<head>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title></title>

	

	<!-- toolkit styles -->
	<link rel="stylesheet" href="http://localhost:3000/assets/toolkit.css">
	<!-- /toolkit styles -->

</head>
<body>



	<div class="container">
	<div class="content">
		<header>
			<span class="show__mobile"><img src="http://localhost:3000/images/arrow.jpeg" alt=""></span>
			<a href="#"><img class="logo__img" src="http://localhost:3000/images/logo.svg" alt=""></a>
		</header>

		<section class="two-column__layout setup__mobile">
			<div class="two-column__info flex flex-column">
				<div class="background-title mb30">
					<h1>Notifications</h1>
					<p class="shadow__title">setup your account</p>
				</div>
				<h5 class="show__mobile"><img src="http://localhost:3000/images/sign.png" alt="" style="width: 20px; margin-right: 10px;">Last thing</h5>
				<div class="mobile__dots">
					<span class="dot active"></span>
					<span class="dot "></span>
					<span class="dot "></span>
				</div>
				<h5 class="">How do you want <br> to be notified?</h5>
				<!-- <img class="img__mobile" src="http://localhost:3000/assets/toolkit/images/checklist.png" alt=""> -->
				
				<div class="flex-grow radio-buttons">
					<label class="radio-container">
						<img src="http://localhost:3000/assets/toolkit/images/new/message.png" style="margin-bottom: 14px;" alt="">
						<div>
							<h5>Mail</h5>
						  <input type="radio" name="notification">
						  <span class="checkmark"></span>
					  </div>
					</label>

					<label class="radio-container">
						<img src="http://localhost:3000/images/chat.png" alt="">
					  <div>
							<h5>SMS</h5>
						  <input type="radio" name="notification">
						  <span class="checkmark"></span>	
					  </div>
					  
					</label>
				</div>
		

				<div class="buttons__group">
						<!-- <button class="button__style no-color">Skip <span class="show__mobile">for now</span></button> -->
						<button class="button__style">Next</button>	
				</div>
			</div>

			<div class="two-column__img">
				<div class="two-column__image">
					<img src="http://localhost:3000/images/checklist.png" alt="">
				</div>
				<div class="dots__group">
					<span class="dot active"></span>
					<span class="dot"></span>
					<span class="dot"></span>
				</div>
			</div>
		</section>
	</div>
</div>

	



	<!-- toolkit scripts -->
	<script src="http://localhost:3000/assets/toolkit/scripts/toolkit.js"></script>
	<!-- /toolkit scripts -->

</body>
</html>
