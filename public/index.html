    <script>
      // Get HTML head element 
        let urls1 = [
          "/admin/assets/multiselect/styles/multiselect.css",
          "/admin/assets/multiselect/multiselect.min.js",
          "/admin/assets/vendor/bootstrap/css/bootstrap.min.css",
          "/admin/assets/vendor/fonts/circular-std/style.css",
          "/admin/assets/libs/css/style.css",
          "/admin/assets/vendor/fonts/fontawesome/css/fontawesome-all.css"
        ]
        let urls2 = [
          "/assets/toolkit.css",
        ]
        var head = document.getElementsByTagName('HEAD')[0];
        let loadUrls = urls => {
          for (var x in urls) {
            url = urls[x];
            var link = document.createElement('link');

            // set the attributes for link element  
            link.rel = 'stylesheet';

            link.type = 'text/css';

            link.href = url;

            // Append link element to HTML head 
            head.appendChild(link);
          }
        }
        if (window.location.href.indexOf("admin") !== -1) loadUrls(urls1)
        else loadUrls(urls2) 
        // Create new link Element 
    </script>
